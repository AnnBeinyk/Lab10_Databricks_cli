name: Databricks Automation

on:
  push:
    branches:
      - master
      - feature/**

jobs:
  run-databricks:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_EMAIL: ${{ secrets.DATABRICKS_EMAIL }}
      DATABRICKS_NOTEBOOK_PATH: ${{ secrets.DATABRICKS_NOTEBOOK_PATH }}
      DATABRICKS_PIPELINE_ID: ${{ secrets.DATABRICKS_PIPELINE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Debug env
        run: |
          if [ -z "$DATABRICKS_EMAIL" ]; then
            echo "DATABRICKS_EMAIL is EMPTY"
            exit 1
          else
            echo "DATABRICKS_EMAIL is SET"
          fi

      - name: Run Databricks automation
        run: python main.py